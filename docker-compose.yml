services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: api
    environment:
      SERVICE_NAME: honeygen-api
      APP_VERSION: ${APP_VERSION:-dev}
      APP_ENV: ${APP_ENV:?APP_ENV must be set}
      HTTP_ADDR: ${API_HTTP_ADDR:-:8080}
      CONFIG_PATH: ${CONFIG_PATH:-/app/config/config.json}
      SQLITE_PATH: ${SQLITE_PATH:-/app/storage/sqlite/honeygen.db}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
      GENERATED_ASSETS_DIR: ${GENERATED_ASSETS_DIR:-/app/storage/generated}
      INTERNAL_EVENT_INGEST_TOKEN: ${INTERNAL_EVENT_INGEST_TOKEN:?INTERNAL_EVENT_INGEST_TOKEN must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      PROVIDER_CONFIG_ENCRYPTION_KEY: ${PROVIDER_CONFIG_ENCRYPTION_KEY:?PROVIDER_CONFIG_ENCRYPTION_KEY must be set}
      FTP_PUBLIC_HOST: ${FTP_PUBLIC_HOST:-127.0.0.1}
      FTP_PASSIVE_PORTS: ${FTP_PASSIVE_PORTS:-9011-9020}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "${API_PORT:-8080}:8080"
      - "${DEPLOYMENT_PORTS:-9000-9020}:${DEPLOYMENT_PORTS:-9000-9020}"
    volumes:
      - sqlite-data:/app/storage/sqlite
      - generated-assets:/app/storage/generated
      - ./backend/config:/app/config:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "port=$${HTTP_ADDR##*:} && wget -qO- http://127.0.0.1:$${port}/healthz | grep -q '^ok$'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  admin-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: admin-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ADMIN_WEB_PORT:-4173}:80"
    volumes:
      - generated-assets:/usr/share/nginx/html/generated:ro

  decoy-web:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: decoy-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      SERVICE_NAME: decoy-web
      APP_ENV: ${APP_ENV:?APP_ENV must be set}
      HTTP_ADDR: ${DECOY_WEB_HTTP_ADDR:-:8081}
      GENERATED_ASSETS_DIR: ${GENERATED_ASSETS_DIR:-/app/storage/generated}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8080}
      INTERNAL_EVENT_INGEST_TOKEN: ${INTERNAL_EVENT_INGEST_TOKEN:?INTERNAL_EVENT_INGEST_TOKEN must be set}
    ports:
      - "${DECOY_WEB_PORT:-8081}:8081"
    volumes:
      - generated-assets:/app/storage/generated:ro

volumes:
  sqlite-data:
  generated-assets:
